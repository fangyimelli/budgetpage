<style>
  :root {
    --bg: #f4f7fb;
    --card: #ffffff;
    --text: #1f2a37;
    --muted: #6b7280;
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --border: #dbe2ea;
    --danger: #dc2626;
    --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    --radius: 18px;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    color: var(--text);
    background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 180px);
  }
  button, input { font: inherit; }
  .app-shell {
    max-width: 1120px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }
  .view { display: none; }
  .view.active, .panel.active { display: block; }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid rgba(219, 226, 234, 0.7);
  }
  .login-card {
    max-width: 460px;
    margin: 8vh auto 0;
    padding: 32px;
  }
  .eyebrow {
    margin: 0 0 8px;
    color: var(--primary);
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 12px;
  }
  h1, h2, h3 { margin: 0 0 8px; }
  .subtitle { margin: 0; color: var(--muted); line-height: 1.6; }
  .form-grid {
    display: grid;
    gap: 16px;
    margin-top: 24px;
  }
  label span {
    display: block;
    margin-bottom: 6px;
    font-size: 14px;
    font-weight: 600;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  input:focus {
    outline: 2px solid rgba(37, 99, 235, 0.18);
    border-color: var(--primary);
  }
  .primary-btn, .secondary-btn, .ghost-btn {
    border: 0;
    border-radius: 12px;
    padding: 12px 18px;
    cursor: pointer;
    transition: 0.2s ease;
  }
  .primary-btn {
    background: var(--primary);
    color: #fff;
    font-weight: 700;
  }
  .primary-btn:hover, .secondary-btn:hover { transform: translateY(-1px); }
  .primary-btn:hover { background: var(--primary-dark); }
  .secondary-btn {
    background: #e8f0ff;
    color: var(--primary-dark);
    font-weight: 700;
  }
  .ghost-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .message { min-height: 24px; margin: 16px 0 0; }
  .error { color: var(--danger); }
  .topbar {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: center;
    padding: 24px;
    margin-bottom: 24px;
  }
  .topbar-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .section-heading {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 16px;
  }
  .info-card {
    grid-column: span 3;
    padding: 20px;
    min-height: 128px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .info-card.wide { grid-column: span 6; }
  .label {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 10px;
  }
  .info-card strong {
    font-size: 24px;
    line-height: 1.4;
    word-break: break-word;
  }
  .panel { display: none; }
  .table-card { padding: 8px; }
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 880px;
  }
  th, td {
    padding: 14px 12px;
    border-bottom: 1px solid #edf2f7;
    text-align: left;
    vertical-align: top;
    font-size: 14px;
  }
  th {
    color: var(--muted);
    background: #f8fbff;
    position: sticky;
    top: 0;
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
  }
  .status-issued { background: #dcfce7; color: #166534; }
  .status-pending { background: #fef3c7; color: #92400e; }
  .description-cell button {
    border: 0;
    background: transparent;
    padding: 0;
    color: inherit;
    text-align: left;
    cursor: pointer;
    max-width: 220px;
  }
  .description-cell button:hover { color: var(--primary-dark); }
  .empty { text-align: center; color: var(--muted); }

  @media (max-width: 900px) {
    .info-card, .info-card.wide { grid-column: span 6; }
  }
  @media (max-width: 640px) {
    .app-shell { padding: 16px 12px 32px; }
    .login-card, .topbar { padding: 20px; }
    .topbar { flex-direction: column; align-items: flex-start; }
    .info-card, .info-card.wide { grid-column: 1 / -1; }
  }
</style>
